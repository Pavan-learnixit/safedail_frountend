plugins {
    id 'com.android.application'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.example.truecaller_clone'
    compileSdk 35

    defaultConfig {
        applicationId "com.example.truecaller_clone"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
