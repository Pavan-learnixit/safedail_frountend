name: Flutter APK CI

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v3

    - name: 💡 Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.0'

    - name: 🔁 Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          ~/.flutter
        key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-

    - name: 📦 Install dependencies
      run: flutter pub get

    - name: ✅ Run dummy test
      run: |
        echo "import 'package:flutter_test/flutter_test.dart';

        void main() {
          test('dummy test', () {
            expect(1 + 1, 2);
          });
        }" > test/app_test.dart
        flutter test

    # Universal APK
    - name: 🏗️ Build universal release APK
      run: flutter build apk --release

    - name: 📤 Upload universal release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    # Split APKs per ABI
    - name: 🏗️ Build split-per-abi APKs
      run: flutter build apk --release --split-per-abi

    - name: 📤 Upload split-per-abi APKs
      uses: actions/upload-artifact@v4
      with:
        name: split-apks
        path: build/app/outputs/flutter-apk/*.apk

    # Android App Bundle (AAB)
    - name: 🏗️ Build release AAB
      run: flutter build appbundle --release

    - name: 📤 Upload release AAB
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: build/app/outputs/bundle/release/app-release.aab
