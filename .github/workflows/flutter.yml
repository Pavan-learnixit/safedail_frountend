name: Flutter Build (Development Branch Only)

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v3

    - name: 💡 Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.3'

    - name: 🔁 Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          ~/.flutter
        key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-

    - name: 📦 Install dependencies
      run: flutter pub get

    - name: ✅ Analyze code (non-blocking)
      run: flutter analyze || true

    - name: 🧪 Run tests (non-blocking)
      run: flutter test || true

    # ⚡ Build Split-per-ABI APKs
    - name: 🏗️ Build split-per-abi APKs
      run: flutter build apk --release --split-per-abi

    - name: 📤 Upload split APKs
      uses: actions/upload-artifact@v4
      with:
        name: split-apks
        path: build/app/outputs/flutter-apk/*-release.apk

    # ⚡ Build Release AAB
    - name: 🏗️ Build release AAB
      run: flutter build appbundle --release

    - name: 📤 Upload release AAB
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: build/app/outputs/bundle/release/app-release.aab
